version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexora-omni-postgres
    environment:
      POSTGRES_DB: nexora_omni
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: nexora-omni-api
    environment:
      JWT_SECRET: change-this-secret
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
